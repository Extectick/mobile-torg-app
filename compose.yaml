services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  migrate:
    profiles:
      - tools
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_PRISMA_QUERIES: ${LOG_PRISMA_QUERIES:-false}
    restart: "no"

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_HTTP_REQUESTS: ${LOG_HTTP_REQUESTS:-true}
      LOG_PRISMA_QUERIES: ${LOG_PRISMA_QUERIES:-false}
      NODE_ENV: production
    expose:
      - "3000"
